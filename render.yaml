services:
  # Frontend - Next.js
  - type: web
    name: legallens-frontend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false  # Set manually in Render dashboard
      - key: NEXT_PUBLIC_APP_NAME
        value: LegalLens
      - key: NODE_VERSION
        value: 18.17.0
    rootDir: frontend
    healthCheckPath: /

