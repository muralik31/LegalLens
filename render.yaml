services:
  # Backend - FastAPI
  - type: web
    name: legallens-backend
    env: python
    region: oregon
    plan: free
    buildCommand: chmod +x render_build.sh && ./render_build.sh
    startCommand: uvicorn app.main_v3:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: legallens-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_NAME
        value: LegalLens
      - key: DEBUG
        value: false
      - key: LLM_PROVIDER
        value: local
      - key: STORAGE_PROVIDER
        value: local
      - key: CORS_ORIGINS
        value: '["https://legallens-frontend.onrender.com","http://localhost:3000"]'
      - key: PYTHON_VERSION
        value: 3.11.0
    rootDir: backend
    healthCheckPath: /health

  # Frontend - Next.js
  - type: web
    name: legallens-frontend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://legallens-backend.onrender.com
      - key: NEXT_PUBLIC_APP_NAME
        value: LegalLens
      - key: NODE_VERSION
        value: 18.17.0
    rootDir: frontend
    healthCheckPath: /

databases:
  - name: legallens-db
    databaseName: legallens
    user: legallens
    region: oregon
    plan: free
